<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Offline | Jazira Elevator</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #050505; /* Jet black */
            color: #e0e0e0; /* Silver */
            text-align: center; 
            padding: 15vh 20px; 
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 50px 40px;
            background: rgba(255, 255, 255, 0.03); /* Subtle glass effect */
            border: 1px solid #333;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }
        h1 { 
            color: #ffffff; 
            font-weight: 300; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
        }
        p { 
            color: #a0a0a0; 
            line-height: 1.6; 
            font-size: 16px;
        }
        .logo { 
            max-width: 120px; 
            margin-bottom: 30px; 
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Pulls the logo.png you already have in your folder -->
        <img src="/logo.png" alt="Jazira Elevator" class="logo">
        
        <h1>System Locked</h1>
        <p>The portal is currently suspended pending administrative updates and backend deployment. Access will be restored once clearance is granted.</p>
        
        <p style="font-size: 12px; margin-top: 50px; color: #444;">Status: 503 Service Unavailable</p>
    </div>
</body>
</html>
